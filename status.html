<!DOCTYPE html>
<html>
<head>

<title>Check Registration Status</title>
<meta name="viewport" content="width=device-width">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(150deg,#020024,#090979,#00d4ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
width:380px;
background:rgba(0,0,0,0.5);
padding:25px;
border-radius:20px;
}

.title{
font-size:28px;
text-align:center;
font-weight:bold;
}

.sub{
text-align:center;
margin-bottom:15px;
color:#ddd;
}

input{
width:100%;
padding:12px;
margin:7px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
}

.timeline{
margin-top:20px;
text-align:left;
}

.step{
padding:10px;
margin:8px 0;
background:rgba(255,255,255,0.1);
border-radius:10px;
}

.done{color:#00ff88;}
.wait{color:orange;}
.fail{color:red;}

.msg{
margin-top:15px;
padding:10px;
background:rgba(255,255,255,0.1);
border-radius:10px;
}

.back{
margin-top:10px;
text-align:center;
cursor:pointer;
color:#ddd;
}

</style>

</head>

<body>

<div class="box">

<div class="title">
Application Status
</div>

<div class="sub">
Secure Print Portal
</div>

<input id="user" 
placeholder="Username"
oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'')">

<input id="mobile" placeholder="Mobile Number">

<button onclick="checkStatus()">
Check Status
</button>

<div id="result"></div>

<div class="back"
onclick="location='index.html'">
Back to Login
</div>

</div>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


window.checkStatus=async function(){

let u=user.value.trim().toLowerCase();
let m=mobile.value.trim();

if(u=="" || m==""){
alert("Enter Username & Mobile");
return;
}

/* CHECK SELLER COLLECTION */

const sellerSnap=await getDocs(collection(db,"seller"));

let found=null;
let status="";
let docId=null;

sellerSnap.forEach((d)=>{

let s=d.data();

if(s.user==u && s.mobile==m){

found=s;
status="approved";

}

});


/* IF NOT FOUND CHECK REGISTRATION */

if(!found){

const regSnap=await getDocs(collection(db,"registration"));

regSnap.forEach((d)=>{

let r=d.data();

if(r.user==u && r.mobile==m){

found=r;
status=r.status;
docId=d.id;

}

});

}


if(!found){

result.innerHTML="<div class='msg'>No Registration Found</div>";
return;

}


/* STATUS ALREADY VIEWED */

if(found.seen==true){

result.innerHTML="<div class='msg'>Status already checked. Please register again.</div>";
return;

}


/* TIMELINE */

let step1="done";
let step2="done";
let step3="wait";
let step4="wait";

if(status=="pending"){
step3="wait";
}

if(status=="approved"){
step3="done";
step4="done";
}

if(status=="rejected"){
step3="done";
step4="fail";
}


/* MESSAGE */

let msg="";

if(status=="approved"){
msg="Welcome! Your account has been approved. You can login now.";
}

if(status=="rejected"){
msg=found.reason || "Your registration was rejected.";
}

if(status=="pending"){
msg="Your request is being processed.";
}


/* UI */

result.innerHTML=

`
<div class="timeline">

<div class="step ${step1}">
✔ Registration Submitted
</div>

<div class="step ${step2}">
✔ Checking Details
</div>

<div class="step ${step3}">
⏳ Processing Request
</div>

<div class="step ${step4}">
${status=="rejected"?"❌ Rejected":"✔ Approved"}
</div>

</div>

<div class="msg">
${msg}
</div>

`;


/* MARK VIEWED */

if(status!="pending" && docId){

await updateDoc(doc(db,"registration",docId),{

seen:true

});

}

}

</script>

</body>
</html>
