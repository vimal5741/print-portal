<!DOCTYPE html>
<html>

<head>

<title>SELLER DASHBOARD</title>

<meta name="viewport" content="width=device-width">

<script>

/* SECURITY */

if(localStorage.getItem("login")!="true"){
location="index.html";
}

if(localStorage.getItem("role")!="seller"){
location="index.html";
}

</script>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

/* HEADER */

.header{
background:#003366;
color:white;
padding:15px;
font-size:20px;
text-align:center;
position:relative;
}

.menuBtn{
position:absolute;
left:10px;
top:12px;
font-size:22px;
cursor:pointer;
}

/* SIDE MENU */

.sideMenu{
position:fixed;
left:-240px;
top:0;
width:230px;
height:100%;
background:#003366;
color:white;
transition:0.3s;
padding-top:10px;
z-index:10;
}

/* SELLER NAME */

.sellerName{
font-size:22px;
font-weight:bold;
text-align:center;
padding:25px 10px;
border-bottom:1px solid rgba(255,255,255,0.2);
animation:glow 2s infinite alternate;
}

@keyframes glow{

0%{
color:white;
}

100%{
color:#00ffff;
}

}

/* MENU ITEMS */

.sideMenu div{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.2);
cursor:pointer;
}

.sideMenu div:hover{
background:#004a99;
}

/* CONTAINER */

.container{
width:95%;
margin:auto;
margin-top:20px;
}

/* WALLET */

.wallet{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 0 12px gray;
}

.walletTitle{
font-size:16px;
color:gray;
}

.balance{
font-size:32px;
color:green;
margin-top:6px;
}

/* COUNTERS */

.counterGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.counter{
padding:15px;
border-radius:10px;
color:white;
text-align:center;
box-shadow:0 0 10px gray;
}

.counter b{
font-size:22px;
}

.recharge{
background:linear-gradient(45deg,#28a745,#5ddf88);
}

.debit{
background:linear-gradient(45deg,#dc3545,#ff6b6b);
}

.bonus{
background:linear-gradient(45deg,#ff9800,#ffc266);
}

.balanceCard{
background:linear-gradient(45deg,#003366,#0066cc);
}

/* ALL SERVICES */

.serviceMain{
margin-top:25px;
background:linear-gradient(45deg,#007bff,#00c6ff);
color:white;
padding:30px;
border-radius:12px;
text-align:center;
font-size:22px;
cursor:pointer;
box-shadow:0 0 15px gray;
}

</style>

</head>

<body>

<div class="header">

<span class="menuBtn" onclick="toggleMenu()">☰</span>

SELLER DASHBOARD

</div>


<div class="sideMenu" id="menu">

<div class="sellerName" id="sellerName">
SELLER
</div>

<div onclick="location='seller.html'">
Dashboard
</div>

<div onclick="location='seller_profile.html'">
Profile
</div>

<div onclick="location='seller_wallet.html'">
Wallet
</div>

<div onclick="location='seller_add_balance.html'">
Add Balance
</div>

<div onclick="logout()">
Logout
</div>

</div>


<div class="container">

<!-- WALLET -->

<div class="wallet">

<div class="walletTitle">
Wallet Balance
</div>

<div class="balance" id="bal">
₹0
</div>

</div>

<!-- COUNTERS -->

<div class="counterGrid">

<div class="counter balanceCard">

Balance

<b id="cBalance">₹0</b>

</div>

<div class="counter recharge">

Recharge

<b id="cRecharge">₹0</b>

</div>

<div class="counter debit">

Debit

<b id="cDebit">₹0</b>

</div>

<div class="counter bonus">

Bonus

<b id="cBonus">₹0</b>

</div>

</div>

<!-- ALL SERVICES -->

<div class="serviceMain" onclick="location='services.html'">

ALL SERVICES

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let seller=localStorage.currentSeller;

async function load(){

let ref=doc(db,"seller",seller);

let snap=await getDoc(ref);

let s=snap.data();

bal.innerHTML="₹"+(s.balance||0);
cBalance.innerHTML="₹"+(s.balance||0);

/* SELLER NAME */

document.getElementById("sellerName").innerText =
(s.user || "SELLER").toUpperCase();

/* COUNTERS */

let recharge=0;
let debit=0;
let bonus=0;

let tx=await getDocs(collection(db,"transactions"));

tx.forEach((d)=>{

let t=d.data();

if(t.seller==seller){

if(t.type=="Recharge"){
recharge+=Number(t.amount);
}

if(t.type=="Debit"){
debit+=Number(t.amount);
}

if(t.type=="Bonus"){
bonus+=Number(t.amount);
}

}

});

cRecharge.innerHTML="₹"+recharge;
cDebit.innerHTML="₹"+debit;
cBonus.innerHTML="₹"+bonus;

}

load();

</script>

<script>

function toggleMenu(){

let m=document.getElementById("menu");

if(m.style.left=="0px"){
m.style.left="-240px";
}else{
m.style.left="0px";
}

}

function logout(){

localStorage.clear();
location="index.html";

}

</script>

</body>
</html>
