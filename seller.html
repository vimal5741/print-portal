<script>

/* LOGIN PROTECTION */

if(localStorage.getItem("login")!="true"){

window.location.replace("index.html");

}


/* AUTO LOGOUT AFTER 1 HOUR */

let session=localStorage.getItem("session");

if(session){

let now=Date.now();

let diff=(now-Number(session))/1000;

if(diff>3600){

localStorage.clear();

window.location.replace("index.html");

}

}

</script>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {

getFirestore,
doc,
getDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";



const firebaseConfig={

apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",

authDomain:"printportal-36ae0.firebaseapp.com",

projectId:"printportal-36ae0"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



let sellerID=localStorage.currentSeller;


/* INVALID SESSION CHECK */

if(!sellerID){

window.location.replace("index.html");

}



/* LOAD SELLER DATA */

const snap=await getDoc(doc(db,"seller",sellerID));

let s=snap.data();



/* SHOW USER DATA */

document.getElementById("username").innerHTML=s.user;

document.getElementById("sellerName").innerHTML="User : "+s.user;

document.getElementById("validity").innerHTML="Validity : "+s.expiry;

document.getElementById("pdfcount").innerHTML="PDF : "+(s.pdf||0);



/* EXPIRY CHECK */

if(new Date(s.expiry) < new Date()){

alert("Your ID Expired");

logout();

}



/* TEMP PASSWORD ALERT */

if(s.temp){

alert("Temporary Password Detected\nChange Password Now");

}



/* CHANGE PASSWORD */

window.changePass=async function(){

let p=prompt("Enter New Password");

if(!p) return;



await updateDoc(doc(db,"seller",sellerID),{

pass:p,
temp:false

});

alert("Password Changed");

}



/* OPEN AADHAR PAGE */

window.openAadhar=function(){

location="aadhar.html";

}

</script>



<script>

/* PROFILE MENU */

function menu(){

let m=document.getElementById("menu");

m.style.display=

m.style.display=="block"

?"none":"block";

}


/* LOGOUT */

function logout(){

localStorage.clear();

window.location.replace("index.html");

}

</script>
