<!DOCTYPE html>
<html>
<head>

<title>Balance Requests</title>
<meta name="viewport" content="width=device-width">

<script>

/* ADMIN SECURITY */

if(localStorage.getItem("login")!="true"){
location="index.html";
}

if(localStorage.getItem("role")!="admin"){
location="index.html";
}

</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f0f2f5;
}

/* HEADER */

.header{
background:#003366;
color:white;
padding:15px;
font-size:22px;
text-align:center;
position:relative;
}

/* BACK BUTTON */

.backBtn{
position:absolute;
left:15px;
top:10px;
background:white;
color:#003366;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* TABLE */

table{
width:95%;
margin:20px auto;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0px 0px 10px gray;
}

th{
background:#003366;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.green{
background:green;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.red{
background:red;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.pending{
color:orange;
font-weight:bold;
}

.approved{
color:green;
font-weight:bold;
}

.rejected{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<button class="backBtn" onclick="goBack()">
⬅ Back
</button>

Balance Requests

</div>

<table id="tbl">

<tr>
<th>SR</th>
<th>SELLER</th>
<th>AMOUNT</th>
<th>UTR</th>
<th>TIME</th>
<th>STATUS</th>
<th>APPROVE</th>
<th>REJECT</th>
</tr>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


load();


async function load(){

tbl.innerHTML=`
<tr>
<th>SR</th>
<th>SELLER</th>
<th>AMOUNT</th>
<th>UTR</th>
<th>TIME</th>
<th>STATUS</th>
<th>APPROVE</th>
<th>REJECT</th>
</tr>
`;

const snap=await getDocs(collection(db,"balance_requests"));

let i=1;

for(const d of snap.docs){

let r=d.data();

/* GET SELLER NAME */

let sellerSnap=await getDoc(doc(db,"seller",r.seller));

let sellerName="-";

if(sellerSnap.exists()){
sellerName=sellerSnap.data().user;
}

let row=tbl.insertRow();

row.insertCell(0).innerHTML=i++;

row.insertCell(1).innerHTML=sellerName;

row.insertCell(2).innerHTML="₹"+r.amount;

row.insertCell(3).innerHTML=r.utr;

row.insertCell(4).innerHTML=r.time;

/* STATUS */

let st=row.insertCell(5);

if(r.status=="pending"){
st.innerHTML="<span class='pending'>Processing</span>";
}

else if(r.status=="approved"){
st.innerHTML="<span class='approved'>Approved</span>";
}

else{
st.innerHTML="<span class='rejected'>Rejected</span>";
}

/* APPROVE BUTTON */

let approveCell=row.insertCell(6);

/* REJECT BUTTON */

let rejectCell=row.insertCell(7);

if(r.status=="pending"){

approveCell.innerHTML=
"<span class='green' onclick='approve(\""+d.id+"\")'>Approve</span>";

rejectCell.innerHTML=
"<span class='red' onclick='reject(\""+d.id+"\")'>Reject</span>";

}else{

approveCell.innerHTML="-";
rejectCell.innerHTML="-";

}

}

}


/* APPROVE */

window.approve=async function(id){

let ref=doc(db,"balance_requests",id);

let snap=await getDoc(ref);

let r=snap.data();

/* SELLER */

let sellerRef=doc(db,"seller",r.seller);

let sellerSnap=await getDoc(sellerRef);

let seller=sellerSnap.data();

/* NEW BALANCE */

let newBal=(seller.balance||0)+Number(r.amount);

/* UPDATE BALANCE */

await updateDoc(sellerRef,{
balance:newBal
});

/* UPDATE REQUEST */

await updateDoc(ref,{
status:"approved",
message:"Recharge Approved"
});

/* SAVE TRANSACTION */

await addDoc(collection(db,"transactions"),{

seller:r.seller,
type:"credit",
amount:r.amount,
note:"Recharge Approved",
time:new Date().toLocaleString()

});

alert("Recharge Approved");

location.reload();

}


/* REJECT */

window.reject=async function(id){

let reason=prompt("Reject Reason");

if(!reason) return;

await updateDoc(doc(db,"balance_requests",id),{

status:"rejected",
message:reason

});

alert("Request Rejected");

location.reload();

}

</script>

<script>

function goBack(){

location="admin.html";

}

</script>

</body>
</html>
