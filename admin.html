<!DOCTYPE html>
<html>

<head>

<title>PRINT PORTAL ADMIN</title>

<meta name="viewport" content="width=device-width">

<script>

if(localStorage.getItem("login")!="true" || localStorage.getItem("role")!="admin"){
location.replace("index.html");
}

</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
}

/* HEADER */

.header{
background:#0b3d6d;
color:white;
padding:16px;
font-size:22px;
text-align:center;
position:relative;
font-weight:bold;
}

.menuBtn{
position:absolute;
left:15px;
top:12px;
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-240px;
top:0;
width:240px;
height:100%;
background:#002244;
color:white;
transition:.3s;
z-index:5;
padding-top:20px;
}

.sidebar div{
padding:15px;
border-bottom:1px solid rgba(255,255,255,0.1);
cursor:pointer;
}

.sidebar div:hover{
background:#003366;
}

/* DASHBOARD */

.stats{
width:92%;
margin:25px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:18px;
}

.statBox{
background:white;
height:110px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.statBox span{
font-size:14px;
color:#555;
}

.statBox b{
font-size:28px;
margin-top:6px;
}

.card1{border-top:4px solid #2196f3;}
.card2{border-top:4px solid #4caf50;}
.card3{border-top:4px solid #ff9800;}
.card4{border-top:4px solid #9c27b0;}
.card5{border-top:4px solid #f44336;}
.card6{border-top:4px solid #009688;}

/* SELLER PANEL */

.tools{
width:95%;
margin:20px auto;
display:flex;
gap:10px;
}

.tools input{
padding:8px;
}

/* TABLE */

table{
width:95%;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0px 0px 10px rgba(0,0,0,0.15);
}

th{
background:#0b3d6d;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.userlink{
color:#0b3d6d;
cursor:pointer;
font-weight:bold;
}

/* BUTTONS */

.enable{
background:#2e7d32;
color:white;
padding:5px 12px;
border-radius:6px;
cursor:pointer;
}

.disable{
background:#d32f2f;
color:white;
padding:5px 12px;
border-radius:6px;
cursor:pointer;
}

.active{
background:#1b7f5f;
color:white;
padding:5px 12px;
border-radius:6px;
cursor:pointer;
}

.inactive{
background:orange;
color:white;
padding:5px 12px;
border-radius:6px;
cursor:pointer;
}

.del{
background:#cc0000;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<span class="menuBtn" onclick="toggleMenu()">☰</span>

PRINT PORTAL ADMIN

</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div onclick="showDashboard()">Dashboard</div>

<div onclick="showSeller()">Manage Sellers</div>

<div onclick="location='admin_recharge_verify.html'">Recharge Requests</div>

<div onclick="location='approved_recharge.html'">Approved Recharge</div>

<div onclick="location='rejected_recharge.html'">Rejected Recharge</div>

<div onclick="location='registration_requests.html'">Registration Requests</div>

<div onclick="location='transactions.html'">Transactions</div>

<div onclick="logout()">Logout</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="stats">

<div class="statBox card1">
<span>Total Sellers</span>
<b id="totalSeller">0</b>
</div>

<div class="statBox card2">
<span>Active Sellers</span>
<b id="activeSeller">0</b>
</div>

<div class="statBox card3">
<span>Inactive Sellers</span>
<b id="inactiveSeller">0</b>
</div>

<div class="statBox card4">
<span>Total Balance</span>
<b id="totalBalance">₹0</b>
</div>

<div class="statBox card5">
<span>Total PDF</span>
<b id="totalPDF">0</b>
</div>

<div class="statBox card6">
<span>Registration Requests</span>
<b id="regReq">0</b>
</div>

</div>

</div>

<!-- SELLER PANEL -->

<div id="sellerPanel" style="display:none">

<div class="tools">

<input id="searchBox" placeholder="Search Username">

</div>

<table id="tbl"></table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import { getFirestore,collection,getDocs,doc,updateDoc,deleteDoc }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

/* CARD ELEMENTS */

const totalSellerEl=document.getElementById("totalSeller");
const activeSellerEl=document.getElementById("activeSeller");
const inactiveSellerEl=document.getElementById("inactiveSeller");
const totalBalanceEl=document.getElementById("totalBalance");
const totalPDFEl=document.getElementById("totalPDF");
const regReqEl=document.getElementById("regReq");

const tbl=document.getElementById("tbl");
const searchBox=document.getElementById("searchBox");

let sellers=[];

loadDashboard();
loadSeller();

/* DASHBOARD */

async function loadDashboard(){

const sellerSnap=await getDocs(collection(db,"seller"));

let totalSeller=0;
let activeSeller=0;
let inactiveSeller=0;
let totalBalance=0;
let totalPDF=0;

sellerSnap.forEach((d)=>{

let s=d.data();

totalSeller++;
totalBalance+=s.balance||0;
totalPDF+=s.pdf||0;

if(s.active){
activeSeller++;
}else{
inactiveSeller++;
}

});

totalSellerEl.innerText=totalSeller;
activeSellerEl.innerText=activeSeller;
inactiveSellerEl.innerText=inactiveSeller;
totalBalanceEl.innerText="₹"+totalBalance;
totalPDFEl.innerText=totalPDF;

/* REGISTRATION REQUEST COUNT */

const reg=await getDocs(collection(db,"registration"));

let pending=0;

reg.forEach((d)=>{
if(d.data().status=="pending") pending++;
});

regReqEl.innerText=pending;

}

/* SELLER LIST */

async function loadSeller(){

const snap=await getDocs(collection(db,"seller"));

sellers=[];

snap.forEach((d)=>{
let s=d.data();
s.id=d.id;
sellers.push(s);
});

renderTable();

}

function renderTable(){

tbl.innerHTML=`<tr>
<th>SR</th>
<th>USERNAME</th>
<th>NUMBER</th>
<th>BALANCE</th>
<th>PDF</th>
<th>STATUS</th>
<th>ACTIVITY</th>
<th>DELETE</th>
</tr>`;

let i=1;

sellers.forEach((s)=>{

if(searchBox.value &&
!s.user.toLowerCase().includes(searchBox.value.toLowerCase()))
return;

let row=tbl.insertRow();

row.insertCell(0).innerHTML=i++;

row.insertCell(1).innerHTML=
'<span class="userlink" onclick="openSeller(\''+s.id+'\')">'+s.user+'</span>';

row.insertCell(2).innerHTML=s.mobile||"-";
row.insertCell(3).innerHTML="₹"+(s.balance||0);
row.insertCell(4).innerHTML=s.pdf||0;

row.insertCell(5).innerHTML=
s.active
?'<span class="enable" onclick="toggleSeller(\''+s.id+'\',false)">Enable</span>'
:'<span class="disable" onclick="toggleSeller(\''+s.id+'\',true)">Disable</span>';

row.insertCell(6).innerHTML=
s.lastLogin
?'<span class="active">Active</span>'
:'<span class="inactive">Inactive</span>';

row.insertCell(7).innerHTML=
'<span class="del" onclick="deleteSeller(\''+s.id+'\',this)">Delete</span>';

});

}

window.toggleSeller=async function(id,val){

await updateDoc(doc(db,"seller",id),{
active:val
});

loadSeller();
loadDashboard();

}

window.deleteSeller=async function(id,btn){

if(!confirm("Delete Seller?")) return;

await deleteDoc(doc(db,"seller",id));

btn.closest("tr").remove();

loadDashboard();

}

window.openSeller=function(id){

localStorage.setItem("viewSeller",id);
location="seller_detail.html";

}

searchBox.oninput=renderTable;

</script>

<script>

function toggleMenu(){

let s=document.getElementById("sidebar");

s.style.left=s.style.left=="0px"?"-240px":"0px";

}

document.addEventListener("click",function(e){

let s=document.getElementById("sidebar");

if(!s.contains(e.target) && !e.target.classList.contains("menuBtn")){
s.style.left="-240px";
}

});

function showDashboard(){

dashboard.style.display="block";
sellerPanel.style.display="none";

}

function showSeller(){

dashboard.style.display="none";
sellerPanel.style.display="block";
document.getElementById("sidebar").style.left="-240px";

}

function logout(){

localStorage.clear();
location="index.html";

}

</script>

</body>
</html>
