<!DOCTYPE html>
<html>

<head>

<title>Registration Requests</title>

<meta name="viewport" content="width=device-width">

<script>

/* LOGIN SECURITY */

if(localStorage.getItem("login")!="true"){
location.replace("index.html");
}

/* ROLE SECURITY */

if(localStorage.getItem("role")!="admin"){
location.replace("index.html");
}

/* SESSION SECURITY */

let session=localStorage.getItem("session");

if(session){

let now=Date.now();
let diff=(now-Number(session))/1000;

if(diff>3600){

localStorage.clear();
location.replace("index.html");

}

}

</script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f8;
}

/* HEADER */

.header{
background:#0b3d6d;
color:white;
padding:15px;
font-size:22px;
text-align:center;
position:relative;
}

.back{
position:absolute;
left:10px;
top:10px;
background:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

/* SEARCH */

.search{
width:95%;
margin:15px auto;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* TABLE */

table{
width:95%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

th{
background:#0b3d6d;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:center;
}

.approve{
background:#2e7d32;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.reject{
background:#ff9800;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

.delete{
background:#d32f2f;
color:white;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

.popupBox textarea{
width:100%;
height:80px;
}

.popupBox button{
margin-top:10px;
padding:8px 12px;
}

</style>

</head>

<body>

<div class="header">

<button class="back" onclick="location='admin.html'">← Back</button>

Registration Requests

</div>

<div class="search">

<input id="search" placeholder="Search Username">

</div>

<table id="tbl">

<tr>

<th>SR</th>
<th>USERNAME</th>
<th>MOBILE</th>
<th>DATE</th>
<th>ACTION</th>

</tr>

</table>


<!-- REJECT POPUP -->

<div class="popup" id="rejectPopup">

<div class="popupBox">

<h3>Reject Reason</h3>

<textarea id="reason">
Your registration request was rejected due to verification issues.
Please contact admin or submit correct details.
</textarea>

<br>

<button onclick="submitReject()">Submit</button>

<button onclick="closePopup()">Cancel</button>

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
deleteDoc,
updateDoc,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const tbl=document.getElementById("tbl");
const search=document.getElementById("search");

let data=[];
let rejectId="";

load();

/* LOAD DATA */

async function load(){

const snap=await getDocs(collection(db,"registration"));

data=[];

snap.forEach((d)=>{

let r=d.data();

if(r.status!="pending") return;

r.id=d.id;

data.push(r);

});

render();

}

/* TABLE */

function render(){

tbl.innerHTML=`
<tr>
<th>SR</th>
<th>USERNAME</th>
<th>MOBILE</th>
<th>DATE</th>
<th>ACTION</th>
</tr>
`;

let i=1;

data.forEach((r)=>{

if(search.value && !r.user.includes(search.value)) return;

let row=tbl.insertRow();

row.insertCell(0).innerHTML=i++;

row.insertCell(1).innerHTML=r.user;

row.insertCell(2).innerHTML=r.mobile;

let d=new Date(r.time);

row.insertCell(3).innerHTML=d.toLocaleDateString();

row.insertCell(4).innerHTML=`

<div style="display:flex;justify-content:center;gap:10px;align-items:flex-start;">

<div style="display:flex;flex-direction:column;gap:6px;">

<span class="approve" onclick='approve("${r.id}")'>
Approve
</span>

<span class="reject" onclick='openReject("${r.id}")'>
Reject
</span>

</div>

<div>

<span class="delete" onclick='del("${r.id}")'>
Delete
</span>

</div>

</div>

`;

});

}

search.oninput=render;


/* APPROVE */

window.approve=async function(id){

let r=data.find(x=>x.id==id);

await addDoc(collection(db,"seller"),{

user:r.user,
mobile:r.mobile,
pass:r.pass,

balance:0,
pdf:0,

active:true,

created:new Date().toISOString().split("T")[0],

lastLogin:{
seconds:Math.floor(Date.now()/1000)
}

});

await deleteDoc(doc(db,"registration",id));

load();

}


/* DELETE */

window.del=async function(id){

if(!confirm("Delete Request?")) return;

await deleteDoc(doc(db,"registration",id));

load();

}


/* REJECT */

window.openReject=function(id){

rejectId=id;

rejectPopup.style.display="flex";

}

window.closePopup=function(){

rejectPopup.style.display="none";

}

window.submitReject=async function(){

let msg=document.getElementById("reason").value;

await updateDoc(doc(db,"registration",rejectId),{

status:"rejected",
reason:msg

});

closePopup();

load();

}

</script>

</body>

</html>
