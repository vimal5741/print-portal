<!DOCTYPE html>
<html>
<head>

<title>Print Portal Register</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(150deg,#020024,#090979,#00d4ff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

.box{
width:90%;
max-width:380px;
background:rgba(0,0,0,0.55);
padding:25px;
border-radius:20px;
position:relative;
box-shadow:0px 0px 25px rgba(0,0,0,0.6);
}

.back{
position:absolute;
left:15px;
top:15px;
cursor:pointer;
font-size:14px;
color:#ddd;
}

.back:hover{
color:white;
}

.title{
font-size:30px;
text-align:center;
font-weight:bold;
}

.sub{
text-align:center;
margin-bottom:15px;
color:#ddd;
}

input{
width:100%;
padding:12px;
margin:7px 0;
border-radius:10px;
border:none;
font-size:15px;
}

.userMsg{
font-size:13px;
margin-top:-4px;
margin-bottom:6px;
}

.passBox{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:14px;
cursor:pointer;
color:black;
}

.role{
display:flex;
margin-top:10px;
}

.role button{
flex:1;
margin:3px;
padding:10px;
border:none;
border-radius:10px;
background:#003366;
color:white;
cursor:pointer;
font-size:15px;
}

.active{
background:#00cc99 !important;
}

.register{
width:100%;
padding:13px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00d4ff,#0072ff);
color:white;
font-size:17px;
cursor:pointer;
box-shadow:0px 0px 15px rgba(0,0,0,0.5);
}

.register:hover{
opacity:.9;
}

.loginLink{
text-align:center;
margin-top:10px;
cursor:pointer;
color:#ddd;
font-size:14px;
}

.loginLink:hover{
color:white;
}

</style>

</head>

<body>

<div class="box">

<div class="back" onclick="location='index.html'">
⬅ Back to Login
</div>

<div class="title">
WELCOME
</div>

<div class="sub">
Secure Print Portal
</div>

<input id="user"
placeholder="Username"
oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'');checkUsername()">

<div id="userMsg" class="userMsg"></div>

<input id="mobile"
placeholder="Mobile Number"
maxlength="10"
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<div class="passBox">

<input id="pass" type="password" placeholder="Password">

<span class="eye" onclick="showPass('pass')">👁</span>

</div>

<div class="passBox">

<input id="pass2" type="password" placeholder="Confirm Password">

<span class="eye" onclick="showPass('pass2')">👁</span>

</div>

<div class="role">

<button id="seller" onclick="setRole('seller')">
Seller
</button>

<button id="admin" onclick="setRole('admin')">
Admin
</button>

<button id="master" onclick="setRole('master')">
Master
</button>

</div>

<button class="register" onclick="registerUser()">
Register
</button>

<div class="loginLink" onclick="location='index.html'">
Back to Login
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let role="";
let usernameAvailable=true;

/* ROLE SELECT */

window.setRole=function(r){

role=r;

seller.classList.remove("active");
admin.classList.remove("active");
master.classList.remove("active");

document.getElementById(r).classList.add("active");

if(r==="master"){
alert("Master Panel Coming Soon");
}

}

/* LIVE USERNAME CHECK */

window.checkUsername=async function(){

let u=user.value.trim().toLowerCase();

if(u.length<3){

userMsg.innerText="Minimum 3 characters required";
userMsg.style.color="orange";
usernameAvailable=false;
return;

}

let taken=false;

/* CHECK SELLER */

const sellerSnap=await getDocs(collection(db,"seller"));

sellerSnap.forEach((d)=>{
if(d.data().user==u){
taken=true;
}
});

/* CHECK REGISTRATION */

const regSnap=await getDocs(collection(db,"registration"));

regSnap.forEach((d)=>{

let r=d.data();

if(r.user==u && r.status!="rejected"){
taken=true;
}

});

if(taken){

userMsg.innerText="❌ Username already taken";
userMsg.style.color="red";
usernameAvailable=false;

}else{

userMsg.innerText="✔ Username available";
userMsg.style.color="#00ff88";
usernameAvailable=true;

}

}

/* REGISTER USER */

window.registerUser=async function(){

let u=user.value.trim().toLowerCase();
let m=mobile.value.trim();
let p=pass.value.trim();
let p2=pass2.value.trim();

if(u==""||m==""||p==""||p2==""||role==""){
alert("Fill All Fields");
return;
}

if(!usernameAvailable){
alert("Please choose another username");
return;
}

if(p!=p2){
alert("Password Not Match");
return;
}

if(m.length!=10){
alert("Enter Valid 10 Digit Mobile Number");
return;
}

if(role=="master"){
alert("Master Panel Coming Soon");
return;
}

/* CHECK EXISTING USER */

const snap=await getDocs(collection(db,"registration"));

let existingUser=null;
let docId=null;

snap.forEach((d)=>{

let r=d.data();

if(r.user==u){
existingUser=r;
docId=d.id;
}

});

if(existingUser){

if(existingUser.status=="approved"){
alert("Username already exists");
return;
}

if(existingUser.status=="pending"){
alert("Your request is already under review");
return;
}

if(existingUser.status=="rejected"){

await updateDoc(doc(db,"registration",docId),{

status:"pending",
reason:"",
time:Date.now(),
seen:false

});

alert("Application submitted again");

location="index.html";

return;

}

}

/* SAVE NEW REGISTRATION */

await addDoc(collection(db,"registration"),{

user:u,
mobile:m,
pass:p,
role:role,
status:"pending",
reason:"",
seen:false,
time:Date.now()

});

alert("Registration Submitted");

location="index.html";

}

</script>

<script>

function showPass(id){

let x=document.getElementById(id);

if(x.type=="password")
x.type="text";
else
x.type="password";

}

</script>

</body>
</html>
