<!DOCTYPE html>
<html>
<head>

<title>Print Portal Maintenance</title>
<meta name="viewport" content="width=device-width">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020024,#090979,#00d4ff);
color:white;
text-align:center;
}

/* CARD */

.box{
background:rgba(0,0,0,0.55);
padding:45px;
border-radius:20px;
width:400px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

/* TITLE */

.title{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

/* PORTAL NAME */

.portal{
font-size:18px;
color:#ddd;
margin-bottom:25px;
}

/* LOADER */

.loader{
margin:25px auto;
width:60px;
height:60px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.3);
border-top:6px solid #00ffd5;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* MESSAGE */

.msg{
font-size:17px;
line-height:1.6;
color:#eee;
margin-top:10px;
}

/* REFRESH */

.refresh{
margin-top:20px;
font-size:14px;
color:#ccc;
}

</style>

</head>

<body>

<div class="box">

<div class="title">
⚙️ Under Maintenance
</div>

<div class="portal">
Secure Print Portal
</div>

<div class="loader"></div>

<div class="msg">
We are currently upgrading the system<br>
to improve performance and security.
<br><br>
Please check back shortly.
</div>

<div class="refresh">
Page will refresh automatically...
</div>

</div>

<script>

setTimeout(function(){
location.reload();
},30000);

</script>

</body>
</html>
