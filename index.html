<!DOCTYPE html>
<html>
<head>

<title>PRINT PORTAL</title>

<meta name="viewport" content="width=device-width">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b2c50,#1b5c99,#3a8fd6);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:380px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.1);
box-shadow:0px 0px 30px black;
text-align:center;
color:white;
}

.title{font-size:35px;font-weight:bold;}
.sub{opacity:.8;margin-bottom:20px;}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

.passBox{position:relative;}

.eye{
position:absolute;
right:10px;
top:14px;
cursor:pointer;
color:black;
}

.role{
display:flex;
margin-top:10px;
}

.role button{
flex:1;
margin:3px;
padding:10px;
border:none;
border-radius:10px;
background:#003366;
color:white;
cursor:pointer;
}

.active{
background:#00ccff !important;
}

.loginBtn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00ccff,#0066ff);
color:white;
font-size:18px;
cursor:pointer;
}

.load{
width:100%;
height:6px;
background:#002244;
border-radius:10px;
margin-top:10px;
overflow:hidden;
display:none;
}

.bar{
height:6px;
width:0%;
background:#00ff66;
transition:2s linear;
}

.register{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00cc66,#00994d);
color:white;
font-size:16px;
cursor:pointer;
}

.status{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ffaa00,#ff6600);
color:white;
font-size:16px;
cursor:pointer;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#001122;
padding:25px;
border-radius:20px;
display:none;
width:260px;
color:white;
text-align:center;
box-shadow:0px 0px 20px black;
}

.green{color:#00ff88;}
.red{color:red;}

.okBtn{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<div class="title">WELCOME</div>
<div class="sub">Secure Print Portal</div>

<input id="user" 
placeholder="Username"
oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9]/g,'')">

<div class="passBox">
<input id="pass" type="password" placeholder="Password">
<span class="eye" onclick="eye()">👁</span>
</div>

<div class="role">

<button id="sellerBtn" class="active" onclick="setRole('seller')">
Seller
</button>

<button id="adminBtn" onclick="setRole('admin')">
Admin
</button>

<button id="masterBtn" onclick="setRole('master')">
Master
</button>

</div>

<button class="loginBtn" onclick="startLogin()">
LOGIN
</button>

<div class="load" id="load">
<div class="bar" id="bar"></div>
</div>

<button class="register" onclick="location='registration.html'">
New Registration
</button>

<button class="status" onclick="location='status.html'">
Check Registration Status
</button>

</div>

<div class="popup" id="popup">
<div id="msg"></div>
<button class="okBtn" onclick="closePop()">OK</button>
</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let role="seller";

window.setRole=function(r){

role=r;

sellerBtn.classList.remove("active");
adminBtn.classList.remove("active");
masterBtn.classList.remove("active");

document.getElementById(r+"Btn").classList.add("active");

}

window.eye=function(){
pass.type=pass.type=="password"?"text":"password";
}

window.closePop=function(){

popup.style.display="none";
load.style.display="none";
bar.style.width="0%";

}

window.startLogin=function(){

if(user.value=="" || pass.value==""){
popupFail("Enter Username & Password");
return;
}

load.style.display="block";
bar.style.width="0%";

setTimeout(()=>{
bar.style.width="100%";
},50);

setTimeout(login,2000);

}

async function login(){

let u=user.value.trim();
let p=pass.value.trim();

if(role=="master"){
popupFail("Master Panel Coming Soon");
return;
}

/* ADMIN LOGIN */

if(role=="admin"){

const snap=await getDoc(doc(db,"admin","login"));
let a=snap.data();

if(a && a.user==u && a.pass==p){

localStorage.setItem("login","true");
localStorage.setItem("role","admin");
localStorage.setItem("session",Date.now());

popupSuccess("admin.html");
return;

}else{

popupFail("Username & Password Not Match");
return;

}

}

/* SELLER LOGIN */

if(role=="seller"){

const snap=await getDocs(collection(db,"seller"));

let found=false;

for(const d of snap.docs){

let s=d.data();

if(s.user==u && s.pass==p){

found=true;

/* CHECK ACTIVE */

if(!s.active){
popupFail("Seller ID Disabled. Contact Admin");
return;
}

/* UPDATE LAST LOGIN */

await updateDoc(doc(db,"seller",d.id),{

lastLogin:new Date()

});

/* LOGIN SUCCESS */

localStorage.setItem("currentSeller",d.id);
localStorage.setItem("login","true");
localStorage.setItem("role","seller");
localStorage.setItem("session",Date.now());

popupSuccess("seller.html");
return;

}

}

if(!found){
popupFail("Username & Password Not Match");
}

}

}

function popupSuccess(page){

msg.innerHTML="<h2 class='green'>Login Successful</h2>";
popup.style.display="block";

setTimeout(()=>{
window.location.replace(page);
},1500);

}

function popupFail(text){

msg.innerHTML="<h2 class='red'>"+text+"</h2>";
popup.style.display="block";

}

</script>

</body>
</html>
