<!DOCTYPE html>
<html>
<head>

<title>Maintenance</title>
<meta name="viewport" content="width=device-width">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(140deg,#020024,#090979,#00d4ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.box{
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:20px;
width:380px;
}

.title{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
font-size:18px;
color:#ddd;
margin-bottom:15px;
}

.icon{
font-size:70px;
margin-bottom:15px;
}

.msg{
font-size:16px;
color:#eee;
}

</style>

</head>

<body>

<div class="box">

<div class="icon">
⚙️
</div>

<div class="title">
Site Under Maintenance
</div>

<div class="sub">
Secure Print Portal
</div>

<div class="msg">
We are currently updating the system.<br>
Please check back later.
</div>

</div>

</body>
</html>
