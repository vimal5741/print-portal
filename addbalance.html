<!DOCTYPE html><html><head><title>Add Balance</title><meta name="viewport" content="width=device-width"><script>

/* LOGIN SECURITY */

if(localStorage.getItem("login")!="true"){
window.location.replace("index.html");
}

/* SESSION CHECK */

let session=localStorage.getItem("session");

if(session){

let now=Date.now();
let diff=(now-Number(session))/1000;

if(diff>3600){

localStorage.clear();
window.location.replace("index.html");

}

}

</script><style>

body{

Add Balance
</div><div class="nav"><button onclick="location='seller.html'">
Dashboard
</button><button onclick="location='wallet.html'">

</button><button onclick="location='profile.html'">
Profile
</button><button onclick="logout()">
Logout
</button></div><div class="box"><h2>Add Balance Request</h2><input id="amount" placeholder="Enter Amount"><input id="utr" placeholder="Enter UTR Number"><button class="submit" onclick="submitReq()">
Submit Request
</button><div class="info">
Balance will update after admin verification
</div></div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",
authDomain:"printportal-36ae0.firebaseapp.com",
projectId:"printportal-36ae0"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


window.submitReq=async function(){

let amt=document.getElementById("amount").value;
let utr=document.getElementById("utr").value;

if(amt=="" || utr==""){

alert("Fill all fields");

return;

}

let seller=localStorage.currentSeller;

await addDoc(collection(db,"balance_request"),{

seller:seller,
amount:Number(amt),
utr:utr,
status:"pending",
date:new Date().toISOString()

});

alert("Request Submitted");

location="wallet.html";

}

</script><script>

function logout(){

localStorage.clear();
location="index.html";

}

</script></body>
</html>
