<!DOCTYPE html>
<html>

<head>

<title>Seller Profile</title>

<meta name="viewport" content="width=device-width">

<script>

/* SECURITY */

if(localStorage.getItem("login")!="true"){
location="index.html";
}

if(localStorage.getItem("role")!="seller"){
location="index.html";
}

/* SESSION */

let session=localStorage.getItem("session");

if(session){

let now=Date.now();
let diff=(now-session)/1000;

if(diff>3600){

localStorage.clear();
location="index.html";

}

}

</script>

<style>

body{
margin:0;
font-family:Arial;
background:#eef1f6;
}

/* HEADER */

.header{

background:#003366;
color:white;
padding:15px;
font-size:22px;
text-align:center;

}

/* PROFILE CARD */

.profileBox{

background:white;
width:360px;
margin:30px auto;
padding:25px;
border-radius:12px;
box-shadow:0px 0px 15px gray;

}

/* AVATAR */

.avatar{

width:90px;
height:90px;
border-radius:50%;
display:block;
margin:auto;
margin-bottom:15px;

}

/* TITLE */

.title{

text-align:center;
font-size:20px;
margin-bottom:20px;

}

/* ROW */

.row{

display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
font-size:15px;

}

.label{
font-weight:bold;
color:#333;
}

.value{
color:#003366;
}

/* BUTTON */

.btn{

margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:6px;
background:#003366;
color:white;
font-size:15px;
cursor:pointer;

}

.btn:hover{

background:#0b4a85;

}

.back{

background:#666;

}

</style>

</head>

<body>

<div class="header">

Seller Profile

</div>

<div class="profileBox">

<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
class="avatar">

<div class="title">

<span id="username"></span>

</div>

<div class="row">

<span class="label">Mobile</span>

<span class="value" id="mobile"></span>

</div>

<div class="row">

<span class="label">Created</span>

<span class="value" id="created"></span>

</div>

<div class="row">

<span class="label">Expiry</span>

<span class="value" id="expiry"></span>

</div>

<div class="row">

<span class="label">Wallet Balance</span>

<span class="value">₹<span id="balance"></span></span>

</div>

<div class="row">

<span class="label">Total PDF</span>

<span class="value" id="pdf"></span>

</div>

<button class="btn" onclick="changePass()">

Change Password

</button>

<button class="btn back" onclick="back()">

Back to Dashboard

</button>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyB6iuJiQANc5DIon2ulq8NAtj6SPWT--sY",

authDomain:"printportal-36ae0.firebaseapp.com",

projectId:"printportal-36ae0"

};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

let sellerID=localStorage.currentSeller;

const snap=await getDoc(doc(db,"seller",sellerID));

let s=snap.data();

/* SHOW DATA */

username.innerHTML=s.user;

mobile.innerHTML=s.mobile || "-";

created.innerHTML=s.created;

expiry.innerHTML=s.expiry;

balance.innerHTML=s.balance || 0;

pdf.innerHTML=s.pdf || 0;

/* CHANGE PASSWORD */

window.changePass=async function(){

let p=prompt("Enter New Password");

if(!p) return;

await updateDoc(doc(db,"seller",sellerID),{

pass:p,
temp:false

});

alert("Password Changed");

}

</script>

<script>

function back(){

location="seller.html";

}

</script>

</body>
</html>
